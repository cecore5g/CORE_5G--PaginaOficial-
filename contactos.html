<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contactos - Centro de Estudiantes CORE 5G</title>

<style>

:root{
    --morado:#6A0DAD;
    --naranja:#ff7a00;
    --gris:#1b1b26;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f0f16;
    color:white;
}

header{
    text-align:center;
    padding:60px 20px;
}

.titulo-integrantes{
    text-align:center;
    color:var(--naranja);
    font-size:2rem;
    margin-bottom:35px;
}

.contactos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    flex-wrap:wrap;
    padding:30px 0;
}

.social-link{
    width:65px;
    height:65px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1b1b26;
    border-radius:15px;
    transition:.3s;
    border:1px solid rgba(255,255,255,.08);
}

.social-link:hover{
    transform:translateY(-5px) scale(1.08);
    border-color:#ff7a00;
    box-shadow:0 0 20px rgba(255,122,0,.3);
}

.social-link img{
    width:32px;
    height:32px;
    filter:invert(1);
}


header h1{
    color:var(--naranja);
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    opacity:.8;
}

.btn-volver{
    display:inline-block;
    margin-top:25px;
    background:var(--naranja);
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn-volver:hover{
    background:var(--morado);
}

.redes {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin:30px 0;
}

.social-link{
    width:65px;
    height:65px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--gris);
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

#contenedorIntegrantes{
    width:90%;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.social-link:hover{
    transform:translateY(-5px);
    border-color:var(--naranja);
    box-shadow:0 0 20px rgba(255,122,0,.25);
}

.social-link img{
    width:30px;
    height:30px;
    object-fit:contain;
    filter:invert(1);
}

.tarjeta{
    background:var(--gris);
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
    text-align:center;
}

.tarjeta:hover{
    transform:translateY(-8px);
    border-color:var(--naranja);
}

#contenedorIntegrantes{
    width: 90%;
    margin: 0 auto; /* centra el div */
}

#contenedorIntegrantes{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 250px));
    justify-content: center; /* centra las columnas */
    gap: 20px;
}



.botones{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: 5px;
    margin-top:15px;
}



.tarjeta img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.info{
    padding:20px;
}

.info h3{
    color:var(--naranja);
    margin-bottom:8px;
    font-size:1.2rem;
}

.info p{
    margin-bottom:15px;
    opacity:.9;
}

.contactos{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding-bottom:60px;
}

.card{
    background:var(--gris);
    padding:30px;
    border-radius:20px;
    text-align:center;
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:var(--naranja);
}

.icono{
    font-size:4rem;
    margin-bottom:15px;
}

.card h3{
    color:var(--naranja);
    margin-bottom:10px;
}

.card p{
    margin-bottom:20px;
    opacity:.9;
}

.btn{
    display:inline-block;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:.3s;
}

.whatsapp{
    background:#25D366;
}

.facebook{
    background:#1877F2;
}

.instagram{
    background:#E4405F;
}

.email{
    background:#EA4335;
}

.btn:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:25px;
    background:#0b0b11;
    opacity:.8;
}

    .contactos{
        gap:15px;
    }

    .social-link{
        width:55px;
        height:55px;
    }

    .social-link img{
        width:28px;
        height:28px;
    }

    @media (max-width:768px){

    header{
        padding:40px 15px;
    }

    header h1{
       font-size: 1.5rem; /* 👈 aquí controlas el tamaño */
        line-height: 1.2;
    }

    header p{
        font-size:.95rem;
        max-width:500px;
        margin:auto;
    }

    .info{
        padding: 10px ;
    }

    .info h3{
         font-size: .80rem;
        line-height: 1.2;
        word-break: break-word;
         }

.info p{
  font-size: 0.60rem;
  opacity: .9;
  word-break: break-word;
}

.btn{
  font-size: 0.6rem;
  padding: 5px 7px;
  border-radius: 10px;
  display: inline-block;
  text-align: center;
}

    .social-link{
        width:55px;
        height:55px;
    }

    .social-link img{
        width:25px;
        height:25px;
    }

    #contenedorIntegrantes{
        width:40%;
        grid-template-columns:1fr;
    }

    .tarjeta img{
        height:100px;
    }

    .btn{
        width:100%;
    }

    footer{
        font-size:.60rem;
    }
    #contenedorIntegrantes{
    width: 90%;
    margin: 0 auto;
    display: grid;
     grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    }
    }
 



</style>

</head>
<body>

    <p>

    </p>

    <section class="redes">

    <a href="https://www.tiktok.com/@c.e.core5g?_r=1&_t=ZS-97Exkpj0nvI"
       target="_blank"
       class="social-link">

        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" alt="TikTok">

    </a>

    <a href="https://www.facebook.com/share/1H1dF7AqhR/"
       target="_blank"
       class="social-link">

        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">

    </a>

    <a href="https://www.instagram.com/c.e.core5g?igsh=emJoaWkwdHhoa25j"

       class="social-link">

        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">

    <a href="index.html" class="btn-volver">

    </a>

    </section>

</header>

<section>

  <h2 style="text-align:center; color:#ff7a00; margin-bottom:30px;">
    Integrantes
  </h2>

  <div id="contenedorIntegrantes">
    <!-- aquí van las tarjetas -->
  </div>

</section>

<footer>
    © 2026 CENTRO DE ESTUDIANTES CORE 5G
</footer>

<script src="integrantes.js"></script>

<script>
console.log("HTML cargado");
console.log(typeof integrantes);
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const contenedor = document.getElementById("contenedorIntegrantes");

    if (!contenedor) {
        console.error("No existe el contenedor");
        return;
    }

    if (typeof integrantes === "undefined") {
        console.error("No se cargó integrantes.js");
        return;
    }

    integrantes.forEach(persona => {

        contenedor.insertAdjacentHTML("beforeend", `
            <div class="tarjeta">

                <img src="${persona.foto}" alt="${persona.nombre}">

                <div class="info">

                    <h3>${persona.nombre}</h3>

                    <p>${persona.cargo}</p>

                    <div class="botones">

                        <a href="https://wa.me/${persona.whatsapp}"
                        target="_blank"
                        class="btn whatsapp">
                            WhatsApp
                        </a>

                    </div>

                </div>

            </div>
        `);

    });

});
</script>

</body>
</html>
